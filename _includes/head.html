<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">

  {%- seo -%}
  {%- feed_meta -%}

  <link rel="icon" type="image/png" href="/assets/images/favicon-96x96.png?v=1" sizes="96x96" />
  <link rel="shortcut icon" href="/assets/images/favicon.ico?v=1" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/apple-touch-icon.png?v=1" />
  <meta name="apple-mobile-web-app-title" content="Kyrylo Silin" />
  <link rel="manifest" href="/assets/images/site.webmanifest?v=1" />

  <script async src="https://analytics.kyrylo.org/js/pa-AIFJJD2jjgvAtiz_pzq6_.js"></script>
  <script>
    window.plausible = window.plausible || function () { (plausible.q = plausible.q || []).push(arguments) }, plausible.init = plausible.init || function (i) { plausible.o = i || {} };
    plausible.init()
  </script>

  <style>
    :root {
      --font-size: clamp(1rem, 1vw, 1.75rem);
    }

    body {
      font: normal 400 var(--font-size)/1.5 sans-serif;
    }

    main,
    footer {
      max-width: 68ch;
      margin: 0 auto;
    }

    pre {
      overflow: auto;
    }

    pre,
    blockquote {
      background-color: ghostwhite;
      color: darkslategray;
    }

    .article img {
      max-width: 100%;
    }

    .article a,
    code {
      word-break: break-word;
    }

    .article p {
       max-width: 60ch;
    }

    code {
      font-size: var(--font-size);
    }

    blockquote {
      margin: 1em 0;
      padding-left: 20px;
      border-left: 4px solid dimgray;
    }

    nav a {
      margin-right: 8px;
    }

    a {
      color: blue;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    a:visited:active,
    a:active {
      color: red;
    }

    a:visited {
      color: purple;
    }

    ul.blog-posts {
      list-style-type: none;
      padding: unset;
      margin: 0;
    }

    ul.blog-posts li {
      display: flex;
      align-items: baseline;
      gap: 1ch;
    }

    ul.blog-posts time {
      flex: 0 0 12ch;
      font-size: var(--font-size);
      font-family: monospace;
    }

    .profile-photo {
      width: clamp(120px, 120px + 4vw, 180px);
      height: auto;
    }

    .author-avatar {
      height: 1em;
      width: 1em;
      vertical-align: baseline;
    }

    @media (prefers-color-scheme: dark) {
      a {
        color: mediumslateblue;
      }

      a:visited:active,
      a:active {
        color: orangered;
      }

      a:visited {
        color: plum;
      }

      pre,
      blockquote {
        color: lightsteelblue;
        background-color: #2b2b2b;
      }
    }
  </style>
</head>
